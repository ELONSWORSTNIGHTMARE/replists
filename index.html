<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hades AI Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">HADES AI</div>
  <button onclick="generate()" class="btn">Generate</button>
</header>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="left">

    <textarea id="prompt" placeholder="Describe your app..."></textarea>

    <input type="file" id="imageInput" accept="image/*"/>

    <div id="aiStatus">Idle</div>

    <div class="files" id="files"></div>

  </div>

  <!-- EDITOR -->
  <div class="editor">
    <textarea id="code" oninput="save()"></textarea>
  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <iframe id="frame"></iframe>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
